name: Scheduled Beta Release

on:
  schedule:
    - cron: '0 4  * * *'     # Daily at 04:00 UTC
  workflow_dispatch:         # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  beta-release:
    name: Create Beta Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to inspect tags and commits

      - name: Determine and push beta tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags

          # Latest stable release (no pre-release suffix)
          LATEST_STABLE=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "Latest stable: ${LATEST_STABLE:-none}"

          # Latest beta tag of any version
          LATEST_BETA=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$' | head -1)
          echo "Latest beta: ${LATEST_BETA:-none}"

          # Use the most recent release (beta or stable) to detect new commits
          LAST_RELEASE=${LATEST_BETA:-$LATEST_STABLE}

          if [ -z "$LAST_RELEASE" ]; then
            echo "No previous release found. Proceeding with first beta."
            NEW_COMMITS=1
            FRONTEND_NEW=0
          else
            NEW_COMMITS=$(git rev-list "${LAST_RELEASE}..HEAD" --count)
            echo "New backend commits since ${LAST_RELEASE}: ${NEW_COMMITS}"

            # Check frontend repo for new commits since last release was published.
            # Use the GitHub release publish date (not the commit date, which is fixed
            # and causes the workflow to fire every day even with no new commits).
            LAST_RELEASE_DATE=$(gh release view "$LAST_RELEASE" --json publishedAt --jq '.publishedAt' 2>/dev/null || true)
            if [ -z "$LAST_RELEASE_DATE" ]; then
              # Fallback for tags that have no GitHub release yet
              LAST_RELEASE_DATE=$(git log -1 --format=%aI "$LAST_RELEASE")
            fi
            echo "Last release date: $LAST_RELEASE_DATE"
            FRONTEND_NEW=$(gh api "repos/donetick/frontend/commits?sha=main&since=${LAST_RELEASE_DATE}&per_page=1" --jq 'length')
            echo "New frontend commits since ${LAST_RELEASE}: ${FRONTEND_NEW}"
          fi

          if [ "$NEW_COMMITS" -eq "0" ] && [ "${FRONTEND_NEW:-0}" -eq "0" ]; then
            echo "No new commits in backend or frontend — skipping beta release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine the base version for the next beta.
          # Convention: beta tags track the *next* patch over the latest stable.
          if [ -z "$LATEST_STABLE" ]; then
            MAJOR=0; MINOR=0; PATCH=1
          else
            MAJOR=$(echo "$LATEST_STABLE" | sed -E 's/v([0-9]+)\.[0-9]+\.[0-9]+/\1/')
            MINOR=$(echo "$LATEST_STABLE" | sed -E 's/v[0-9]+\.([0-9]+)\.[0-9]+/\1/')
            PATCH=$(echo "$LATEST_STABLE" | sed -E 's/v[0-9]+\.[0-9]+\.([0-9]+)/\1/')
            PATCH=$((PATCH + 1))
          fi

          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Beta base version: v${BASE_VERSION}"

          # Increment beta counter for this base version
          EXISTING_BETA=$(git tag --sort=-v:refname | grep -E "^v${BASE_VERSION}-beta\.[0-9]+$" | head -1)
          if [ -z "$EXISTING_BETA" ]; then
            BETA_NUM=1
          else
            BETA_NUM=$(echo "$EXISTING_BETA" | sed -E 's/.*-beta\.([0-9]+)$/\1/')
            BETA_NUM=$((BETA_NUM + 1))
          fi

          NEW_TAG="v${BASE_VERSION}-beta.${BETA_NUM}"
          echo "Creating tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          # Explicitly trigger go-release.yml (tag push won't trigger other workflows from Actions)
          gh workflow run go-release.yml --repo ${{ github.repository }} -f tag="$NEW_TAG"

      - name: Summary
        if: steps.tag.outputs.should_release == 'true'
        run: echo "Beta tag ${{ steps.tag.outputs.new_tag }} pushed and go-release.yml triggered."
