        "400":
          description: 'error: Invalid project ID or Error binding project data'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'error: Error getting current user'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Error updating project or Error getting updated project'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - JWTKeyAuth: []
      - APIKeyAuth: []
      summary: Update a project
      tags:
      - projects
  /things:
    get:
      consumes:
      - application/json
      description: Retrieves all things belonging to the current user
      produces:
      - application/json
      responses:
        "200":
          description: 'res: array of things'
          schema:
            additionalProperties:
              items: {}
              type: array
            type: object
        "401":
          description: 'error: Unauthorized'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Failed to retrieve things'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - JWTKeyAuth: []
      - APIKeyAuth: []
      summary: Get all things
      tags:
      - things
    post:
      consumes:
      - application/json
      description: Creates a new thing for the current user with the given name, type,
        and optional state
      parameters:
      - description: Thing creation request
        in: body
        name: thing
        required: true
        schema:
          $ref: '#/definitions/thing.ThingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 'res: created thing object'
          schema:
            additionalProperties:
              $ref: '#/definitions/model.Thing'
            type: object
        "400":
          description: 'error: Invalid request | Invalid state'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'error: Unauthorized'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Failed to create thing'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - JWTKeyAuth: []
      - APIKeyAuth: []
      summary: Create a new thing
      tags:
      - things
    put:
      consumes:
      - application/json
      description: Updates the name, type, and optionally the state of an existing
        thing
      parameters:
      - description: Thing update request
        in: body
        name: thing
        required: true
        schema:
          $ref: '#/definitions/thing.ThingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'res: updated thing object'
          schema:
            additionalProperties:
              $ref: '#/definitions/model.Thing'
            type: object
        "400":
          description: 'error: Invalid request | Invalid state'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'error: Unauthorized'
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'error: Forbidden'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Unable to find thing | Failed to update thing'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - JWTKeyAuth: []
      - APIKeyAuth: []
      summary: Update a thing
      tags:
      - things
  /things/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a thing by ID; fails if there are chores still associated
        with it
      parameters:
      - description: Thing ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: empty response on success
        "400":
          description: 'error: Invalid thing id'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'error: Unauthorized'
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'error: Forbidden'
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: 'error: Unable to delete thing with associated tasks'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Unable to find thing | Unable to find tasks linked
            to this thing | Failed to delete thing'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - JWTKeyAuth: []
      - APIKeyAuth: []
      summary: Delete a thing
      tags:
      - things
  /things/{id}/history:
    get:
