        offset
      parameters:
      - description: Thing ID
        in: path
        name: id
        required: true
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'res: thing history entries'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 'error: Invalid thing id | Invalid offset'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'error: Unauthorized'
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'error: Forbidden'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Unable to find thing | Failed to retrieve history'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - JWTKeyAuth: []
      - APIKeyAuth: []
      summary: Get thing history
      tags:
      - things
  /things/{id}/state:
    put:
      consumes:
      - application/json
      description: Updates the state of a thing by ID and triggers any associated
        chore due dates
      parameters:
      - description: Thing ID
        in: path
        name: id
        required: true
        type: integer
      - description: New state value
        in: query
        name: value
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'res: updated thing object'
          schema:
            additionalProperties:
              $ref: '#/definitions/model.Thing'
            type: object
        "400":
          description: 'error: Invalid thing id | value query param is required |
            Invalid state'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'error: Unauthorized'
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'error: Forbidden'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Unable to find thing | Failed to update state'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - JWTKeyAuth: []
      - APIKeyAuth: []
      summary: Update thing state
      tags:
      - things
securityDefinitions:
  APIKeyAuth:
    description: donetick issued apikey
    in: header
    name: secretkey
    type: apiKey
  JWTKeyAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
